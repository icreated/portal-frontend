<!-- Presets -->
<div class="theme-card">
  <div class="theme-card-header">
    <i class="pi pi-th-large"></i>
    <span>{{ 'theme-presets' | translate }}</span>
  </div>
  <div class="theme-card-body">
    <div class="presets-grid">
      @for (t of themes; track t) {
        <button
          type="button"
          class="preset-swatch"
          [class.active]="t === theme"
          [title]="t.name"
          [style.background]="'linear-gradient(135deg, ' + t.headerBgColor + ' 50%, ' + t.headerBgColor2 + ' 50%)'"
          (click)="selectTheme(t)">
          @if (t === theme) {
            <i class="pi pi-check"></i>
          }
        </button>
      }
    </div>
  </div>
</div>

<!-- General -->
<div class="theme-card">
  <div class="theme-card-header">
    <i class="pi pi-sliders-h"></i>
    <span>{{ 'theme-general' | translate }}</span>
  </div>
  <div class="theme-card-body">
    <div class="color-grid">
      <div class="color-row">
        <label>{{ 'color_main_background' | translate }}</label>
        <p-colorPicker [(ngModel)]="theme.mainBackground" (onChange)="updateTheme()"></p-colorPicker>
      </div>
      <div class="color-row">
        <label>{{ 'color_button_background' | translate }}</label>
        <p-colorPicker [(ngModel)]="theme.primaryColor" (onChange)="updateTheme()"></p-colorPicker>
      </div>
      <div class="color-row">
        <label>{{ 'color_button_text' | translate }}</label>
        <p-colorPicker [(ngModel)]="theme.primaryColorText" (onChange)="updateTheme()"></p-colorPicker>
      </div>
      <div class="color-row">
        <label>{{ 'font-text' | translate }}</label>
        <p-select [options]="fonts" [(ngModel)]="theme.fontFamily" (onChange)="updateTheme()" styleClass="font-select"></p-select>
      </div>
    </div>
  </div>
</div>
