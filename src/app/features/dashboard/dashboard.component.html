<!-- Stat Cards -->
<div class="stat-grid">
  @for (card of statCards; track card.titleKey) {
    @if (isLoading) {
      <div class="stat-card stat-card-skeleton">
        <p-skeleton height="90px" borderRadius="12px"></p-skeleton>
      </div>
    } @else {
      <div class="stat-card" [ngClass]="card.bgClass"
           [class.clickable]="!!card.routerLink"
           [routerLink]="card.routerLink ?? null">
        <div class="stat-card-icon">
          <i [class]="card.icon" [style.color]="card.iconColor"></i>
        </div>
        <div class="stat-card-body">
          <span class="stat-title">{{ card.titleKey | translate }}</span>
          <span class="stat-value">
            @if (card.titleKey === 'stat-open-balance') {
              {{ card.value | currency: currencyISO }}
            } @else {
              {{ card.value }}
            }
          </span>
          @if (card.trend !== undefined) {
            <span class="stat-trend" [ngClass]="card.trend >= 0 ? 'trend-up' : 'trend-down'">
              <i [class]="card.trend >= 0 ? 'pi pi-arrow-up' : 'pi pi-arrow-down'"></i>
              {{ card.trend | number: '1.1-1' }}%
            </span>
          }
        </div>
      </div>
    }
  }
</div>
